<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connec+a</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700;900&family=Zen+Old+Mincho:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ai-deep:#1a2744;--ai-mid:#2a4a7f;--ai-soft:#4a6fa5;--ai-pale:#d4e4f7;
      --shiro:#f8f9fc;--shiro-warm:#fdfaf5;--shiro-2:#eef2f8;
      --border:rgba(42,74,127,.15);
      --haru:#f4b8cb;--natsu:#7b5ea7;--aki:#d4511a;--fuyu:#b8d4f0;
      --matcha:#4e7252;
      --shadow-sm:0 2px 16px rgba(26,39,68,.08);
      --shadow-md:0 8px 32px rgba(26,39,68,.14);
      --shadow-lg:0 16px 48px rgba(26,39,68,.2);
      --radius:16px;--radius-sm:10px;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--shiro);color:var(--ink);min-height:100vh;overflow-x:hidden;}

    /* 藍染菱形パターン */
    .indigo-pattern{
      position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 8 L72 40 L40 72 L8 40 Z' fill='none' stroke='%231a2744' stroke-width='1.5'/%3E%3Ccircle cx='40' cy='40' r='3' fill='%231a2744'/%3E%3C/svg%3E");
    }

    /* 四季アニメ背景 */
    .seasons-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .petal{position:absolute;font-size:.9rem;animation:petalFall linear infinite;opacity:0;}
    @keyframes petalFall{0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0;}5%{opacity:.5;}95%{opacity:.3;}100%{transform:translateY(105vh) rotate(720deg) translateX(60px);opacity:0;}}
    .hotaru{position:absolute;width:3px;height:3px;border-radius:50%;background:#c8e832;box-shadow:0 0 6px #c8e832;animation:hotaruFloat ease-in-out infinite;opacity:0;}
    @keyframes hotaruFloat{0%,100%{opacity:0;transform:translate(0,0);}20%{opacity:.8;}50%{transform:translate(25px,-18px);}80%{opacity:.5;}}
    .momiji{position:absolute;font-size:.85rem;animation:momijiDrift linear infinite;opacity:0;}
    @keyframes momijiDrift{0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}8%{opacity:.5;}92%{opacity:.25;}100%{transform:translateY(105vh) rotate(-540deg) translateX(-80px);opacity:0;}}
    .yuki{position:absolute;border-radius:50%;background:rgba(184,212,240,.7);animation:yukiFall linear infinite;opacity:0;}
    @keyframes yukiFall{0%{transform:translateY(-10px) translateX(0);opacity:0;}10%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(105vh) translateX(20px);opacity:0;}}

    /* ヘッダー */
    .header{
      position:sticky;top:0;z-index:100;
      background:rgba(248,249,252,.94);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
    }
    .header__logo{display:flex;align-items:center;gap:10px;}
    .header__logo-mark{
      width:36px;height:36px;background:var(--ai-deep);border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Zen Old Mincho',serif;font-size:.7rem;color:#fff;font-weight:900;
      letter-spacing:-.02em;line-height:1.1;text-align:center;padding:4px;
    }
    .header__logo-text{
      font-family:'Zen Old Mincho',serif;font-size:1.1rem;color:var(--ai-deep);
      font-weight:700;letter-spacing:.08em;
    }
    .header__logo-text span{color:var(--ai-soft);}
    .header__right{display:flex;align-items:center;gap:8px;}

    /* 言語セレクター */
    .lang-sel{
      padding:6px 10px;border-radius:99px;font-size:.75rem;font-weight:500;
      border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);
      cursor:pointer;outline:none;transition:all .2s;
      font-family:'Noto Sans JP',sans-serif;
    }
    .lang-sel:hover{border-color:var(--ai-mid);}

    .header__btn{
      padding:7px 16px;border-radius:99px;font-size:.8rem;font-weight:500;
      border:1.5px solid var(--border);background:transparent;color:var(--ai-mid);
      cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
    }
    .header__btn:hover{background:var(--ai-deep);color:#fff;border-color:var(--ai-deep);}

    /* 季節ライン */
    .season-line{
      height:3px;display:flex;
      background:linear-gradient(90deg,var(--haru) 0%,var(--natsu) 33%,var(--aki) 66%,var(--fuyu) 100%);
    }

    /* メイン */
    main{position:relative;z-index:2;padding:40px 20px;}
    .container{max-width:880px;margin:0 auto;}
    .container-sm{max-width:560px;margin:0 auto;}

    /* ヒーロー */
    .hero{text-align:center;margin-bottom:48px;animation:heroIn .8s cubic-bezier(.16,1,.3,1) both;}
    @keyframes heroIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .hero__eyebrow{
      font-size:.7rem;letter-spacing:.3em;color:var(--ai-soft);
      margin-bottom:14px;text-transform:uppercase;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .hero__eyebrow::before,.hero__eyebrow::after{
      content:'';width:40px;height:1px;
      background:linear-gradient(90deg,transparent,var(--ai-pale));
    }
    .hero__eyebrow::after{background:linear-gradient(90deg,var(--ai-pale),transparent);}
    .hero__title{
      font-family:'Zen Old Mincho',serif;
      font-size:clamp(2rem,6vw,3.5rem);font-weight:900;
      color:var(--ai-deep);line-height:1.15;margin-bottom:16px;letter-spacing:.03em;
    }
    .hero__title em{
      font-style:normal;
      background:linear-gradient(135deg,var(--ai-mid),var(--natsu));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero__desc{font-size:.9rem;color:var(--ai-soft);line-height:1.9;max-width:440px;margin:0 auto 28px;}
    .seasons-banner{
      display:flex;height:5px;border-radius:99px;overflow:hidden;
      max-width:280px;margin:0 auto;gap:2px;
    }
    .sb{flex:1;border-radius:99px;}
    .sb-h{background:var(--haru);}
    .sb-n{background:var(--natsu);}
    .sb-a{background:var(--aki);}
    .sb-f{background:var(--fuyu);}

    /* イベントグリッド */
    .event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}

    /* イベントカード */
    .event-card{
      background:var(--shiro-warm);border-radius:var(--radius);
      box-shadow:var(--shadow-sm);border:1px solid var(--border);
      overflow:hidden;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease;
      animation:cardIn .6s ease both;position:relative;
    }
    .event-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
    .event-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .event-card:nth-child(4n+1)::before{background:linear-gradient(90deg,var(--haru),#d080a0);}
    .event-card:nth-child(4n+2)::before{background:linear-gradient(90deg,var(--natsu),#5a3a8a);}
    .event-card:nth-child(4n+3)::before{background:linear-gradient(90deg,var(--aki),#a03010);}
    .event-card:nth-child(4n)::before  {background:linear-gradient(90deg,var(--fuyu-d,#4a6fa5),var(--fuyu));}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .event-card:nth-child(1){animation-delay:.05s;}
    .event-card:nth-child(2){animation-delay:.1s;}
    .event-card:nth-child(3){animation-delay:.15s;}
    .event-card:nth-child(4){animation-delay:.2s;}

    .event-card__visual{
      height:100px;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .event-card:nth-child(4n+1) .event-card__visual{background:linear-gradient(135deg,rgba(244,184,203,.25),rgba(137,201,122,.15));}
    .event-card:nth-child(4n+2) .event-card__visual{background:linear-gradient(135deg,rgba(123,94,167,.18),rgba(91,163,232,.15));}
    .event-card:nth-child(4n+3) .event-card__visual{background:linear-gradient(135deg,rgba(212,81,26,.15),rgba(232,200,74,.18));}
    .event-card:nth-child(4n)   .event-card__visual{background:linear-gradient(135deg,rgba(184,212,240,.25),rgba(176,40,60,.1));}
    .event-card__visual-label{
      font-family:'Zen Old Mincho',serif;font-size:.7rem;letter-spacing:.2em;
      color:rgba(26,39,68,.35);font-weight:700;text-transform:uppercase;
    }

    .event-card__body{padding:18px 20px 20px;}
    .event-card__season{font-size:.65rem;letter-spacing:.2em;color:var(--ai-soft);margin-bottom:5px;font-weight:600;text-transform:uppercase;}
    .event-card__name{
      font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;
      color:var(--ai-deep);margin-bottom:4px;line-height:1.4;
    }
    .event-card__date{font-size:.78rem;color:var(--ai-soft);margin-bottom:14px;}
    .event-card__meta{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
    .event-card__row{display:flex;justify-content:space-between;font-size:.825rem;}
    .event-card__label{color:var(--ai-soft);}
    .event-card__value{font-weight:600;color:var(--ai-mid);}

    /* バッジ */
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700;}
    .badge-free{background:rgba(78,114,82,.1);color:#2d7a20;}
    .badge-paid{background:rgba(42,74,127,.08);color:var(--ai-mid);}
    .badge-full{background:rgba(212,81,26,.1);color:var(--aki);}

    /* ボタン */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      padding:10px 22px;border-radius:99px;
      font-size:.875rem;font-weight:700;cursor:pointer;border:none;
      transition:all .3s cubic-bezier(.34,1.56,.64,1);
      font-family:'Noto Sans JP',sans-serif;letter-spacing:.02em;
    }
    .btn:active{transform:scale(.97)!important;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
    .btn-ai{background:var(--ai-deep);color:#fff;box-shadow:0 4px 16px rgba(26,39,68,.22);}
    .btn-ai:hover{background:var(--ai-mid);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,39,68,.28);}
    .btn-h{background:linear-gradient(135deg,var(--haru),#c97090);color:#fff;}
    .btn-n{background:linear-gradient(135deg,var(--natsu),#5a3a8a);color:#fff;}
    .btn-a{background:linear-gradient(135deg,var(--aki),#a03010);color:#fff;}
    .btn-f{background:linear-gradient(135deg,#4a6fa5,var(--fuyu));color:#fff;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ai-mid);}
    .btn-outline:hover{border-color:var(--ai-mid);color:var(--ai-mid);background:rgba(42,74,127,.04);}
    .btn-full{width:100%;}
    .btn-lg{padding:13px 28px;font-size:.95rem;}

    /* フォーム */
    .form-group{margin-bottom:20px;}
    .form-label{display:block;font-size:.8rem;font-weight:700;color:var(--ai-mid);margin-bottom:8px;letter-spacing:.05em;}
    .form-control{
      width:100%;padding:12px 16px;border:1.5px solid var(--border);
      border-radius:var(--radius-sm);font-size:.9rem;color:var(--ai-deep);
      background:#fff;outline:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
    }
    .form-control:focus{border-color:var(--ai-mid);box-shadow:0 0 0 3px rgba(42,74,127,.1);}
    .form-control.error{border-color:var(--aki);}
    .form-control::placeholder{color:rgba(74,111,165,.4);}

    /* カード */
    .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:28px;margin-bottom:20px;border:1px solid var(--border);}
    .card-title{
      font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;
      color:var(--ai-deep);margin-bottom:18px;
      display:flex;align-items:center;gap:10px;
    }
    .card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

    /* アラート */
    .alert{padding:14px 18px;border-radius:var(--radius-sm);font-size:.875rem;margin-bottom:16px;line-height:1.7;}
    .alert-success{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
    .alert-danger {background:rgba(212,81,26,.06);border-left:3px solid var(--aki);color:#8a2010;}
    .alert-info   {background:rgba(42,74,127,.06);border-left:3px solid var(--ai-soft);color:var(--ai-mid);}
    .alert-warning{background:rgba(184,212,240,.2);border-left:3px solid var(--fuyu);color:#3a5a7a;}

    /* スピナー */
    .spinner{width:36px;height:36px;border:3px solid var(--shiro-2);border-top-color:var(--ai-mid);border-radius:50%;animation:spin .8s linear infinite;margin:32px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{text-align:center;color:var(--ai-soft);font-size:.875rem;}

    /* イベント詳細ヘッダー */
    .event-hero{border-radius:var(--radius);padding:22px 24px;margin-bottom:20px;position:relative;overflow:hidden;}
    .eh-h{background:linear-gradient(135deg,rgba(244,184,203,.2),rgba(137,201,122,.15));border:1px solid rgba(244,184,203,.35);}
    .eh-n{background:linear-gradient(135deg,rgba(123,94,167,.15),rgba(91,163,232,.15));border:1px solid rgba(123,94,167,.25);}
    .eh-a{background:linear-gradient(135deg,rgba(212,81,26,.12),rgba(232,200,74,.15));border:1px solid rgba(212,81,26,.2);}
    .eh-f{background:linear-gradient(135deg,rgba(184,212,240,.25),rgba(176,40,60,.08));border:1px solid rgba(184,212,240,.35);}
    .event-hero__name{font-family:'Zen Old Mincho',serif;font-size:1.2rem;font-weight:700;color:var(--ai-deep);margin-bottom:10px;}
    .event-hero__meta{font-size:.875rem;color:var(--ai-mid);line-height:2;}

    /* QRチケット */
    .ticket{
      background:linear-gradient(135deg,#fff,var(--shiro));
      border:1.5px dashed rgba(42,74,127,.2);border-radius:var(--radius);
      padding:28px;text-align:center;margin:20px 0;position:relative;
    }
    .ticket::before,.ticket::after{
      content:'';position:absolute;width:22px;height:22px;
      background:var(--shiro);border-radius:50%;top:50%;transform:translateY(-50%);
    }
    .ticket::before{left:-12px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket::after {right:-12px;border:1.5px dashed rgba(42,74,127,.2);}
    .ticket__title{
      font-family:'Zen Old Mincho',serif;font-size:.8rem;font-weight:700;
      color:var(--ai-mid);margin-bottom:16px;letter-spacing:.18em;
    }
    #qr-canvas{display:flex;justify-content:center;margin:0 auto 12px;}
    .ticket__id{font-size:.68rem;color:var(--ai-soft);font-family:monospace;word-break:break-all;background:var(--shiro-2);padding:6px 10px;border-radius:6px;display:inline-block;}

    /* プロフィール */
    .profile-card{
      border-radius:var(--radius);padding:28px;margin-bottom:20px;
      background:var(--ai-deep);color:#fff;position:relative;overflow:hidden;
    }
    .profile-card::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 60% at 10% 20%,rgba(244,184,203,.15) 0%,transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 80%,rgba(123,94,167,.15) 0%,transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%,rgba(184,212,240,.08) 0%,transparent 70%);
    }
    .profile-name{font-family:'Zen Old Mincho',serif;font-size:1.4rem;font-weight:700;margin-bottom:4px;position:relative;z-index:1;}
    .profile-email{font-size:.825rem;opacity:.55;margin-bottom:20px;position:relative;z-index:1;}
    .profile-stats{display:flex;gap:24px;position:relative;z-index:1;}
    .profile-stat__num{font-size:1.8rem;font-weight:800;line-height:1;}
    .profile-stat__label{font-size:.7rem;opacity:.55;margin-top:3px;}

    /* ランク */
    .rank-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:700;}
    .rank-new     {background:rgba(42,74,127,.08);color:var(--ai-soft);}
    .rank-bronze  {background:rgba(192,120,60,.12);color:#8a4810;}
    .rank-silver  {background:rgba(100,120,160,.12);color:#405080;}
    .rank-gold    {background:rgba(232,200,74,.18);color:#806010;}
    .rank-platinum{background:rgba(123,94,167,.12);color:var(--natsu);}

    /* タブ */
    .tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--shiro-2);padding:4px;border-radius:var(--radius-sm);}
    .tab-btn{flex:1;padding:8px 14px;border:none;background:none;font-size:.825rem;font-weight:600;color:var(--ai-soft);cursor:pointer;border-radius:8px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .tab-btn.active{background:#fff;color:var(--ai-deep);box-shadow:var(--shadow-sm);}

    /* テーブル */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.85rem;}
    th{padding:10px 14px;text-align:left;color:var(--ai-soft);font-weight:600;border-bottom:2px solid var(--shiro-2);white-space:nowrap;}
    td{padding:12px 14px;border-bottom:1px solid var(--shiro-2);}
    tr:hover>td{background:rgba(42,74,127,.02);}

    /* 支払い説明 */
    .payment-box{background:rgba(42,74,127,.05);border:1px solid rgba(42,74,127,.12);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;font-size:.875rem;}
    .payment-box h4{color:var(--ai-mid);margin-bottom:6px;font-weight:700;}
    .payment-box p{color:var(--ai-mid);line-height:1.8;opacity:.85;}

    /* ページ切替 */
    .page{display:none;}
    .page.active{display:block;animation:pageIn .4s ease both;}
    @keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .success-anim{text-align:center;padding:20px 0 8px;animation:burstIn .7s cubic-bezier(.34,1.56,.64,1) both;}
    @keyframes burstIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

    @media(max-width:600px){
      .event-grid{grid-template-columns:1fr;}
      main{padding:24px 14px;}
      .card{padding:20px;}
    }
  </style>
</head>
<body>

<div class="indigo-pattern"></div>
<div class="seasons-bg" id="seasons-bg"></div>

<header class="header">
  <div class="header__logo">
    <div class="header__logo-mark">c+a</div>
    <span class="header__logo-text">connec<span>+</span>a</span>
  </div>
  <div class="header__right">
    <select class="lang-sel" id="lang-sel" onchange="setLang(this.value)">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="ko">한국어</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="pt">Português</option>
      <option value="id">Indonesia</option>
      <option value="th">ภาษาไทย</option>
      <option value="vi">Tiếng Việt</option>
      <option value="ar">العربية</option>
      <option value="hi">हिन्दी</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="ru">Русский</option>
    </select>
    <button class="header__btn" id="btn-mypage" onclick="showMyPage()" data-i18n="mypage">マイページ</button>
    <button class="header__btn" id="btn-back" onclick="showEventList()" style="display:none;" data-i18n="back">一覧へ戻る</button>
  </div>
</header>
<div class="season-line"></div>

<!-- イベント一覧 -->
<div id="page-events" class="page active">
  <main>
    <div class="container">
      <div class="hero">
        <div class="hero__eyebrow" data-i18n="eyebrow">Events</div>
        <h1 class="hero__title"><em>connec+a</em><br><span data-i18n="heroTitle">のイベントへようこそ</span></h1>
        <p class="hero__desc" data-i18n="heroDesc">参加したいイベントを選んで、簡単にお申し込みいただけます。</p>
        <div class="seasons-banner"><span class="sb sb-h"></span><span class="sb sb-n"></span><span class="sb sb-a"></span><span class="sb sb-f"></span></div>
      </div>
      <div id="alert-events"></div>
      <div id="event-list"><div class="spinner"></div><p class="loading-text" data-i18n="loading">読み込み中</p></div>
    </div>
  </main>
</div>

<!-- 参加登録 -->
<div id="page-register" class="page">
  <main>
    <div class="container-sm">
      <div id="reg-event-info"></div>
      <div class="card">

let currentLang=localStorage.getItem('lang')||'ja';
function t(k){return(I18N[currentLang]||I18N.ja)[k]||(I18N.ja)[k]||k;}
function setLang(lang){
  currentLang=lang;localStorage.setItem('lang',lang);
  document.getElementById('lang-sel').value=lang;
  applyI18n();
}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.dataset.i18nPh);});
}
document.getElementById('lang-sel').value=currentLang;

// API
async function api(action,params){
  params=params||{};
  const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(Object.assign({action},params))});
  const json=await res.json();if(!json.success)throw new Error(json.error||'Error');return json.data;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 四季アニメ
function initSeasons(){
  const bg=document.getElementById('seasons-bg');
  const items=[
    ...Array.from({length:6},(_,i)=>({t:'petal',sym:'🌸',l:(i*16+4)+'%',d:(8+i*1.2)+'s',dl:(i*1.8)+'s'})),
    ...Array.from({length:5},(_,i)=>({t:'hotaru',l:(i*18+3)+'%',tp:(i*12+25)+'%',d:(4+i)+'s',dl:(i*2)+'s'})),
    ...Array.from({length:6},(_,i)=>({t:'momiji',sym:['🍁','🍂'][i%2],l:(i*15+5)+'%',d:(7+i*1.1)+'s',dl:(i*2+1)+'s'})),
    ...Array.from({length:10},(_,i)=>({t:'yuki',l:(i*9+1)+'%',sz:(3+i%3)+'px',d:(5+i*0.7)+'s',dl:(i*0.8)+'s'})),
  ];
  items.forEach(item=>{
    const el=document.createElement('div');
    if(item.t==='petal'||item.t==='momiji'){el.className=item.t;el.textContent=item.sym;el.style.cssText=`left:${item.l};animation-duration:${item.d};animation-delay:${item.dl};`;}
    else if(item.t==='hotaru'){el.className='hotaru';el.style.cssText=`left:${item.l};top:${item.tp};animation-duration:${item.d};animation-delay:${item.dl};`;}
    else{el.className='yuki';el.style.cssText=`left:${item.l};width:${item.sz};height:${item.sz};animation-duration:${item.d};animation-delay:${item.dl};`;}
    bg.appendChild(el);
  });
}
initSeasons();

function formatPrice(p,tp){
  if(tp==='FREE'||Number(p)===0)return'<span class="badge badge-free">'+t('free')+'</span>';
  return'<span class="badge badge-paid">¥'+Number(p).toLocaleString()+'</span>';
}
const RANK_LABEL_KEY={New:'New',Bronze:'Bronze',Silver:'Silver',Gold:'Gold',Platinum:'Platinum'};
const RANK_CLASS={New:'rank-new',Bronze:'rank-bronze',Silver:'rank-silver',Gold:'rank-gold',Platinum:'rank-platinum'};
function rankBadge(r){return'<span class="rank-badge '+(RANK_CLASS[r]||'rank-new')+'">'+esc(r)+'</span>';}

const EH_CLASS=['eh-h','eh-n','eh-a','eh-f'];
const BTN_CLASS=['btn-h','btn-n','btn-a','btn-f'];
const SEASON_LABELS=['Spring','Summer','Autumn','Winter'];

let currentEvent=null,currentIdx=0;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function showEventList(){
  showPage('page-events');
  document.getElementById('btn-back').style.display='none';
  document.getElementById('btn-mypage').style.display='';
  loadEvents();
}
function showRegisterPage(ev,idx){
  currentEvent=ev;currentIdx=idx;
  showPage('page-register');
  document.getElementById('btn-back').style.display='';
  document.getElementById('btn-mypage').style.display='none';
  renderRegisterPage(ev,idx);
}
function showMyPage(){
  showPage('page-mypage');
  document.getElementById('btn-back').style.display='';
  document.getElementById('btn-mypage').style.display='none';
  document.getElementById('mypage-lookup').style.display='block';
  document.getElementById('mypage-data').style.display='none';
  document.getElementById('mypage-alert').innerHTML='';
}

async function loadEvents(){
  const listEl=document.getElementById('event-list');
  listEl.innerHTML='<div class="spinner"></div><p class="loading-text">'+t('loading')+'</p>';
  try{
    const events=await api('getEvents');
    if(!events||!events.length){listEl.innerHTML='<div class="alert alert-info">'+t('noRegistrations')+'</div>';return;}
    const grid=document.createElement('div');grid.className='event-grid';
    events.forEach((ev,i)=>{
      const isFull=Number(ev.registrationCount||0)>=Number(ev.Capacity);
      const si=i%4;
      const card=document.createElement('div');card.className='event-card';
      card.innerHTML=
        '<div class="event-card__visual"><span class="event-card__visual-label">'+SEASON_LABELS[si]+'</span></div>'+
        '<div class="event-card__body">'+
          '<div class="event-card__season">connec+a event</div>'+
          '<div class="event-card__name">'+esc(ev.EventName)+'</div>'+
          '<div class="event-card__date">'+esc(ev.Date)+'</div>'+
          '<div class="event-card__meta">'+
            '<div class="event-card__row"><span class="event-card__label">'+t('venue')+'</span><span class="event-card__value">'+esc(ev.Location)+'</span></div>'+
            '<div class="event-card__row"><span class="event-card__label">'+t('price')+'</span><span class="event-card__value">'+formatPrice(ev.Price,ev.PaymentType)+'</span></div>'+
            '<div class="event-card__row"><span class="event-card__label">'+t('seats')+'</span><span class="event-card__value">'+(isFull?'<span class="badge badge-full">'+t('full')+'</span>':(Number(ev.Capacity)-Number(ev.registrationCount||0))+' seats')+'</span></div>'+
          '</div>'+
          (isFull
            ?'<div class="btn btn-outline btn-full" style="cursor:default;opacity:.45;">'+t('full')+'</div>'
            :'<button class="btn '+BTN_CLASS[si]+' btn-full reg-btn">'+t('registerBtn')+' &rarr;</button>'
          )+
        '</div>';
      if(!isFull)card.querySelector('.reg-btn').addEventListener('click',()=>showRegisterPage(ev,i));
      grid.appendChild(card);
    });
    listEl.innerHTML='';listEl.appendChild(grid);
  }catch(err){listEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}
}

function renderRegisterPage(ev,idx){
  const si=idx%4;
  document.getElementById('reg-event-info').innerHTML=
    '<div class="event-hero '+EH_CLASS[si]+'">'+
      '<div class="event-hero__name">'+esc(ev.EventName)+'</div>'+
      '<div class="event-hero__meta">'+esc(ev.Date)+'&emsp;'+esc(ev.Location)+'&emsp;'+(Number(ev.Price)===0?t('free'):'&yen;'+Number(ev.Price).toLocaleString())+'</div>'+
    '</div>';
  const payInfoEl=document.getElementById('payment-info');payInfoEl.innerHTML='';
  if(ev.PaymentType!=='FREE'){
    let h='<div class="payment-box">';
    if(ev.PaymentType==='PAYPAY'||ev.PaymentType==='PAYPAY_OR_CASH')h+='<h4>'+t('payPayInfo')+'</h4><p>'+t('payPayDesc')+'</p>';
    if(ev.PaymentType==='CASH')h+='<h4>'+t('cashInfo')+'</h4><p>'+t('cashDesc')+'</p>';
    if(ev.PaymentType==='PAYPAY_OR_CASH')h+='<p style="margin-top:6px;opacity:.7;">'+t('cashOr')+'</p>';
    h+='</div>';payInfoEl.innerHTML=h;
  }
  ['inp-name','inp-email'].forEach(id=>{const el=document.getElementById(id);el.value='';el.classList.remove('error');el.placeholder='';});
  document.getElementById('inp-name').placeholder=t('nameLabel');
  document.getElementById('inp-email').placeholder=t('emailLabel');
  document.getElementById('reg-alert').innerHTML='';
  document.getElementById('reg-form').style.display='block';
  document.getElementById('reg-result').style.display='none';
  const btn=document.getElementById('btn-submit');
  btn.className='btn '+BTN_CLASS[si]+' btn-full btn-lg';
  btn.textContent=t('registerBtn');btn.disabled=false;
  applyI18n();
}

document.getElementById('btn-submit').addEventListener('click',async()=>{
  const alertEl=document.getElementById('reg-alert');
  const nameEl=document.getElementById('inp-name');const emailEl=document.getElementById('inp-email');
  alertEl.innerHTML='';[nameEl,emailEl].forEach(el=>el.classList.remove('error'));
  let valid=true;
  if(!nameEl.value.trim()){nameEl.classList.add('error');valid=false;}
  if(!emailEl.value.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)){emailEl.classList.add('error');valid=false;}
  if(!valid){alertEl.innerHTML='<div class="alert alert-danger">'+t('validationError')+'</div>';return;}
  const btn=document.getElementById('btn-submit');btn.disabled=true;btn.textContent=t('registering');
  try{
    const result=await api('registerParticipant',{name:nameEl.value.trim(),email:emailEl.value.trim(),phone:'',eventId:currentEvent.EventID});
    document.getElementById('reg-form').style.display='none';
    document.getElementById('reg-result').style.display='block';
    let payHtml='';
    if(result.paymentStatus==='PAYPAY_PENDING')payHtml='<div class="payment-box"><h4>'+t('payPayInfo')+'</h4><p>'+t('payPayPending')+'</p></div>';
    else if(result.paymentStatus==='CASH')payHtml='<div class="alert alert-info">'+t('cashNotice')+'</div>';
    document.getElementById('reg-result').innerHTML=
      '<div class="success-anim" style="font-size:2.5rem;">'+['🌸','🌊','🍁','❄️'][currentIdx%4]+'</div>'+
      '<div class="alert alert-success">'+t('regSuccess')+'</div>'+
      '<div class="ticket"><div class="ticket__title">— '+t('ticketTitle')+' —</div><div id="qr-canvas"></div><div class="ticket__id">'+esc(result.qrData)+'</div></div>'+
      payHtml+
      '<div style="background:var(--shiro-2);border-radius:var(--radius-sm);padding:14px;font-size:.875rem;margin-bottom:20px;">'+esc(result.participant.Name)+'&emsp;'+rankBadge(result.participant.Rank)+'</div>'+
      '<button class="btn btn-outline btn-full" onclick="showEventList()">'+t('backToList')+'</button>';
    new QRCode(document.getElementById('qr-canvas'),{text:result.qrData,width:200,height:200,colorDark:'#1a2744',colorLight:'#f8f9fc'});
  }catch(err){
    btn.disabled=false;btn.textContent=t('registerBtn');
    if(err.message==='FULL')alertEl.innerHTML='<div class="alert alert-warning">'+t('regFull')+'</div>';
    else if(err.message==='ALREADY_REGISTERED')alertEl.innerHTML='<div class="alert alert-info">'+t('regDuplicate')+'</div>';
    else alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';
  }
});

async function loadMyPage(){
  const email=document.getElementById('mypage-email').value.trim();
  const alertEl=document.getElementById('mypage-alert');alertEl.innerHTML='';
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alertEl.innerHTML='<div class="alert alert-danger">'+t('emailError')+'</div>';return;}
  try{
    const participants=await api('getParticipants',{query:email});
    const participant=participants.find(p=>p.Email.toLowerCase()===email.toLowerCase());
    if(!participant){alertEl.innerHTML='<div class="alert alert-warning">'+t('notFound')+'</div>';return;}
    const allRegs=await api('getAllRegistrations',{});
    const myRegs=allRegs.filter(r=>r.ParticipantID===participant.ParticipantID);
    const stats=await api('getStats');const events=stats.eventStats||[];
    document.getElementById('mypage-lookup').style.display='none';
    document.getElementById('mypage-data').style.display='block';
    document.getElementById('profile-card').innerHTML=
      '<div class="profile-name">'+esc(participant.Name)+'</div>'+
      '<div class="profile-email">'+esc(participant.Email)+'</div>'+
      '<div class="profile-stats">'+
        '<div class="profile-stat"><div class="profile-stat__num">'+esc(participant.TotalEvents||0)+'</div><div class="profile-stat__label">'+t('participations')+'</div></div>'+
        '<div class="profile-stat"><div class="profile-stat__num">'+esc(participant.Rank)+'</div><div class="profile-stat__label">'+t('rank')+'</div></div>'+
      '</div>';
    const checked=myRegs.filter(r=>r.CheckinStatus==='TRUE');
    const histEl=document.getElementById('my-history');
    if(!checked.length){histEl.innerHTML='<div class="alert alert-info">'+t('noHistory')+'</div>';}
    else{
      let h='<div class="table-wrap"><table><thead><tr><th>'+t('nameLabel')+'</th><th>'+t('date')+'</th><th></th></tr></thead><tbody>';
      checked.forEach(r=>{const ev=events.find(e=>e.EventID===r.EventID);h+='<tr><td><strong>'+esc(ev?ev.EventName:r.EventID)+'</strong></td><td style="font-size:.8rem;">'+esc(ev?ev.Date:'—')+'</td><td>'+t('participated')+'</td></tr>';});
      h+='</tbody></table></div>';histEl.innerHTML=h;
    }
    const regEl=document.getElementById('my-registrations');
    if(!myRegs.length){regEl.innerHTML='<div class="alert alert-info">'+t('noRegistrations')+'</div>';}
    else{
      let h='';const si_arr=['eh-h','eh-n','eh-a','eh-f'];
      myRegs.forEach((r,i)=>{
        const ev=events.find(e=>e.EventID===r.EventID);
        h+='<div style="border:1px solid var(--border);border-left:3px solid var(--'+['haru','natsu','aki','fuyu'][i%4]+');border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;">'+
          '<div style="font-family:Zen Old Mincho,serif;font-weight:700;color:var(--ai-deep);margin-bottom:8px;">'+esc(ev?ev.EventName:r.EventID)+'</div>'+
          '<div style="font-size:.825rem;color:var(--ai-mid);line-height:1.9;">'+(ev?esc(ev.Date)+'<br>':'')+esc(r.CheckinStatus==='TRUE'?t('participated'):t('notYet'))+'</div>'+
          '<details style="margin-top:10px;"><summary style="font-size:.8rem;color:var(--ai-mid);cursor:pointer;font-weight:600;">'+t('showQR')+'</summary>'+
          '<div style="text-align:center;padding:12px 0;"><div id="qr-r-'+esc(r.RegistrationID)+'"></div>'+
          '<div class="ticket__id" style="margin-top:8px;">'+esc(r.QR)+'</div></div></details></div>';
      });
      regEl.innerHTML=h;
      myRegs.forEach(r=>{
        const el=document.getElementById('qr-r-'+r.RegistrationID);
        if(el&&r.QR)new QRCode(el,{text:r.QR,width:160,height:160,colorDark:'#1a2744',colorLight:'#f8f9fc'});
      });
    }
  }catch(err){alertEl.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>';}
}

function switchMyTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  ['my-history','my-registrations'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('my-'+tab).style.display='block';btn.classList.add('active');
}
document.getElementById('mypage-email').addEventListener('keydown',e=>{if(e.key==='Enter')loadMyPage();});

applyI18n();
loadEvents();
</script>
</body>
</html>
